<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sol Chat</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        #chat-container { width: 100%; max-width: 600px; background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); padding: 20px; }
        #chat-box { height: 400px; overflow-y: auto; border: 1px solid #ddd; padding: 10px; margin-bottom: 15px; border-radius: 4px; background: #fafafa; }
        .message { margin-bottom: 10px; padding: 8px; border-radius: 4px; background: #e1f5fe; }
        .message strong { color: #0288d1; }
        #input-container { display: flex; gap: 10px; }
        #message-input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
        button { padding: 10px 20px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        #user-info { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px; color: #555; }
        .change-name { color: #dc3545; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="user-info">
        <span id="welcome-msg">مرحبًا بك!</span>
        <span class="change-name" onclick="changeUsername()">تغيير الاسم</span>
    </div>
    
    <div id="chat-box"></div>
    
    <div id="input-container">
        <input type="text" id="message-input" placeholder="اكتب رسالتك هنا..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMyMessage()">إرسال</button>
    </div>
</div>

<!-- جلب مكتبة Socket.io من السيرفر تلقائيًا -->
<script src="/socket.io/socket.io.js"></script>
<script>
    // الاتصال بالسيرفر
    const socket = io();

    // 1. دالة جلب وحفظ الاسم تلقائيًا
    function getUsername() {
        let username = localStorage.getItem('chat_username');
        
        while (!username || username.trim() === "") {
            username = prompt("الرجاء إدخال اسمك للبدء في الدردشة:");
            if (username && username.trim() !== "") {
                localStorage.setItem('chat_username', username.trim());
            }
        }
        return username;
    }

    let currentUsername = getUsername();
    document.getElementById('welcome-msg').innerText = `المستخدم الحالي: ${currentUsername}`;

    // دالة لتغيير الاسم إذا أراد المستخدم ذلك لاحقًا
    function changeUsername() {
        let newName = prompt("أدخل الاسم الجديد:", currentUsername);
        if (newName && newName.trim() !== "") {
            localStorage.setItem('chat_username', newName.trim());
            currentUsername = newName.trim();
            document.getElementById('welcome-msg').innerText = `المستخدم الحالي: ${currentUsername}`;
        }
    }

    // 2. دالة إرسال الرسالة إلى السيرفر
    function sendMyMessage() {
        const input = document.getElementById('message-input');
        const messageText = input.value.trim();
        
        if (messageText !== "") {
            // إرسال البيانات للسيرفر
            socket.emit('sendMessage', {
                user: currentUsername,
                message: messageText
            });
            input.value = ""; // تفريغ الحقل بعد الإرسال
        }
    }

    // إرسال الرسالة عند الضغط على زر Enter
    function handleKeyPress(event) {
        if (event.key === 'Enter') {
            sendMyMessage();
        }
    }

    // 3. الاستماع للرسائل القادمة من السيرفر وعرضها (للجميع بما فيهم أنت)
    socket.on('messageReceived', (data) => {
        const chatBox = document.getElementById('chat-box');
        const msgDiv = document.createElement('div');
        msgDiv.classList.add('message');
        
        msgDiv.innerHTML = `<strong>${data.user}:</strong> ${data.message}`;
        chatBox.appendChild(msgDiv);
        
        // النزول التلقائي لأسفل الدردشة عند ظهور رسالة جديدة
        chatBox.scrollTop = chatBox.scrollHeight;
    });
</script>

</body>
</html>
