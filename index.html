<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>غرفة الدردشة العامة</title>
    <style>
        body { font-family: sans-serif; margin: 20px; background: #f0f2f5; }
        #chat-box { width: 100%; max-width: 600px; height: 400px; border: 1px solid #ccc; background: #fff; overflow-y: scroll; padding: 10px; margin-bottom: 10px; border-radius: 8px; }
        .message { background: #e1ffc7; padding: 8px; margin: 5px 0; border-radius: 5px; width: fit-content; max-width: 80%; }
        #input-area { display: flex; max-width: 600px; }
        #message-input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px 0 0 4px; }
        #send-btn { padding: 10px 20px; border: none; background: #007bff; color: white; cursor: pointer; border-radius: 0 4px 4px 0; }
    </style>
</head>
<body>

    <h2>الدردشة العامة 💬</h2>
    <div id="chat-box"></div>
    
    <div id="input-area">
        <input type="text" id="message-input" placeholder="اكتب رسالتك هنا..." autocomplete="off">
        <button id="send-btn">إرسال</button>
    </div>

    <!-- استدعاء مكتبة Socket.io المدمجة -->
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const chatBox = document.getElementById('chat-box');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');

        // طلب اسم المستخدم عند الدخول
        const username = prompt("أدخل اسم المستعار للدردشة:") || "مجهول";

        // إرسال الرسالة
        sendBtn.addEventListener('click', () => {
            const msg = messageInput.value.trim();
            if(msg) {
                socket.emit('chat message', { user: username, text: msg });
                messageInput.value = '';
            }
        });

        // استقبال الرسائل وعرضها فوراً
        socket.on('chat message', (data) => {
            const msgElement = document.createElement('div');
            msgElement.classList.add('message');
            msgElement.innerHTML = `<strong>${data.user}:</strong> ${data.text}`;
            chatBox.appendChild(msgElement);
            chatBox.scrollTop = chatBox.scrollHeight; // النزول لآخر رسالة تلقائياً
        });
    </script>
</body>
</html>
