<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>غرفة الدردشة العامة 💬</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { margin: 0; padding: 20px; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .chat-container { width: 100%; max-width: 600px; background: #fff; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; height: 85vh; overflow: hidden; }
        .chat-header { background: #007bff; color: white; padding: 15px; text-align: center; font-size: 1.2rem; font-weight: bold; }
        #chat-box { flex: 1; padding: 20px; overflow-y: auto; background: #fdfdfd; display: flex; flex-direction: column; gap: 10px; }
        .message { background: #e1ffc7; padding: 10px 14px; border-radius: 8px; max-width: 75%; width: fit-content; word-break: break-word; box-shadow: 0 1px 2px rgba(0,0,0,0.1); align-self: flex-start; }
        .message.system { background: #eee; color: #555; font-style: italic; align-self: center; font-size: 0.9rem; }
        .input-area { display: flex; padding: 15px; background: #fff; border-top: 1px solid #eee; gap: 10px; }
        #message-input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 1rem; outline: none; }
        #message-input:focus { border-color: #007bff; }
        #send-btn { padding: 12px 24px; border: none; background: #007bff; color: white; font-size: 1rem; font-weight: bold; border-radius: 8px; cursor: pointer; transition: background 0.2s; }
        #send-btn:hover { background: #0056b3; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">غرفة الدردشة العامة 👥</div>
    <div id="chat-box">
        <div class="message system">مرحباً بك في غرف الدردشة!</div>
    </div>
    <div class="input-area">
        <input type="text" id="message-input" placeholder="اكتب رسالتك هنا..." autocomplete="off">
        <button id="send-btn">إرسال</button>
    </div>
</div>

<!-- استدعاء مكتبة السوكيت لربط المحادثة الفورية -->
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
    // الاتصال بالسيرفر تلقائياً سواء محلياً أو بعد الرفع على Render
    const socket = io();

    const chatBox = document.getElementById('chat-box');
    const messageInput = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');

    // نافذة منبثقة تطلب الاسم فور دخول الموقع
    let username = prompt("الرجاء إدخال اسمك المستعار لبدء الدردشة:");
    
    // إذا لم يكتب اسماً، يتم تعيين اسم عشوائي له
    if (!username || username.trim() === "") {
        username = "مستخدم_" + Math.floor(Math.random() * 1000);
    }

    // إرسال إشعار للسيرفر بانضمام مستخدم جديد باسمه
    socket.emit('new user', username);

    // دالة إرسال الرسائل
    function sendMessage() {
        const text = messageInput.value.trim();
        if (text !== '') {
            socket.emit('chat message', { user: username, text: text });
            messageInput.value = '';
        }
    }

    // تشغيل الإرسال عند الضغط على الزر أو زر Enter
    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });

    // استقبال الرسائل العامة وعرضها
    socket.on('chat message', (data) => {
        const msgElement = document.createElement('div');
        msgElement.classList.add('message');
        
        // تمييز رسائل المستخدم الحالي بلون مختلف وتنسيق مختلف (اختياري)
        if(data.user === username) {
            msgElement.style.alignSelf = 'flex-end';
            msgElement.style.background = '#d1e7dd';
        }

        msgElement.innerHTML = `<strong>${data.user}:</strong> ${data.text}`;
        chatBox.appendChild(msgElement);
        chatBox.scrollTop = chatBox.scrollHeight; // نزول تلقائي لآخر رسالة
    });

    // استقبال رسائل النظام (دخول وخروج الأعضاء)
    socket.on('system message', (text) => {
        const msgElement = document.createElement('div');
        msgElement.classList.add('message', 'system');
        msgElement.innerText = text;
        chatBox.appendChild(msgElement);
        chatBox.scrollTop = chatBox.scrollHeight;
    });
</script>

</body>
</html>
